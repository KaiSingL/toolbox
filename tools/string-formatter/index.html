  <main id="main" class="main">
    <div class="tool-container">
      <div class="tool-hero">
        <h1 class="section-title">String Formatter</h1>
        <p class="section-subtitle">Format word lists with customizable quotes, delimiters, and line breaks.</p>
      </div>

      <div class="tool-form">
        <div class="form-group">
          <label for="input-text" class="label-brutal">Word List (one per line)</label>
          <textarea
            id="input-text"
            class="input-brutal"
            rows="10"
            placeholder="Enter words here, one per line&#10;e.g.&#10;apple&#10;banana&#10;cherry"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="quote-char" class="label-brutal">Quote Character</label>
            <input
              type="text"
              id="quote-char"
              class="input-brutal"
              value="'"
              maxlength="1"
            />
          </div>

          <div class="form-group">
            <label for="delimiter" class="label-brutal">Delimiter</label>
            <input
              type="text"
              id="delimiter"
              class="input-brutal"
              value=", "
            />
          </div>

          <div class="form-group">
            <label for="words-per-line" class="label-brutal">Words Per Line</label>
            <input
              type="number"
              id="words-per-line"
              class="input-brutal"
              min="1"
              placeholder="All on one line"
            />
          </div>
        </div>

        <div class="form-row checkboxes">
          <div class="checkbox-group">
            <input type="checkbox" id="include-trailing" checked />
            <label for="include-trailing" class="label-brutal checkbox-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="18" x="3" y="3" rx="2" />
              </svg>
              Include trailing delimiter
            </label>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="ignore-blank" checked />
            <label for="ignore-blank" class="label-brutal checkbox-label">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="18" x="3" y="3" rx="2" />
              </svg>
              Ignore blank lines
            </label>
          </div>
        </div>

        <div class="form-row buttons">
          <button id="format-btn" class="btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
              <path d="M9 12v-1h6v1" />
              <path d="M11 17h2" />
              <path d="M12 11v6" />
            </svg>
            Format
          </button>

          <button id="clear-btn" class="btn-secondary">
            Clear
          </button>
        </div>

        <div id="error" class="error-message hidden"></div>

        <div id="output-section" class="output-section hidden">
          <label class="label-brutal">Formatted Output</label>
          <pre id="output" class="output-brutal"></pre>
          <button id="copy-btn" class="btn-primary w-full">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
              <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </svg>
            Copy to Clipboard
          </button>
        </div>
      </div>
    </div>
