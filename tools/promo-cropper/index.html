<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Promo Cropper - DevTools Hub</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
        #crop-overlay {
            border: 4px solid rgba(59, 130, 246, 0.9);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            position: absolute;
            box-sizing: border-box;
            z-index: 10;
        }
        #image {
            touch-action: none;
            user-select: none;
            cursor: grab;
            image-rendering: -webkit-optimize-contrast;
            max-width: none;
            max-height: none;
            min-width: 0;
            min-height: 0;
        }
        #image.dragging {
            cursor: grabbing;
        }
        #drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: rgba(59, 130, 246, 0.1);
        }
        #zoom-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 24, 39, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: auto;
            z-index: 20;
            border: 1px solid #374151;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #zoom-info button {
            background: #374151;
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        #zoom-info button:hover {
            background: #4b5563;
        }
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -100%;
                top: 73px;
                width: 100%;
                max-width: 320px;
                height: calc(100% - 73px);
                z-index: 40;
                transition: left 0.3s ease;
            }
            #sidebar.open {
                left: 0;
            }
            #sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 30;
            }
            #sidebar-overlay.show {
                display: block;
            }
            .back-text {
                display: none;
            }
            .title-text {
                font-size: 16px;
            }
            #zoom-info {
                bottom: 80px;
                padding: 6px 12px;
                font-size: 12px;
            }
            #zoom-info button {
                width: 24px;
                height: 24px;
                font-size: 14px;
            }
            .p-6 {
                padding: 16px;
            }
            .space-y-8 > * + * {
                margin-top: 16px;
            }
            .text-lg {
                font-size: 16px;
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col h-screen">
    <header class="border-b border-gray-800 bg-gray-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 md:px-6 md:py-4 flex items-center gap-4">
            <button id="menu-toggle" class="md:hidden text-gray-400 hover:text-white p-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <a href="../.." class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors group">
                <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                <span class="text-sm font-medium back-text hidden md:block">Back to Tools</span>
            </a>
            <div class="flex-1 text-center">
                <div class="flex items-center justify-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-cyan-600 rounded-lg shadow-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight title-text md:text-xl">Chrome Promo Cropper</h1>
                </div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <div id="sidebar-overlay"></div>
        <div id="sidebar" class="w-96 bg-gray-800 border-r border-gray-700 flex flex-col overflow-y-auto md:relative md:left-0 md:w-96 md:border-r md:max-w-none">
            <div class="p-6 space-y-8 md:p-6 md:space-y-8 p-4 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-3 text-gray-300">Upload Image</label>
                    <div id="drop-zone" class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center cursor-pointer transition-all duration-300 hover:border-blue-500 hover:bg-blue-500/5">
                        <input type="file" id="upload" accept="image/*" class="hidden">
                        <svg class="mx-auto h-12 w-12 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p class="mt-3 text-sm text-gray-400">Click or drag & drop image</p>
                    </div>
                </div>

                <div>
                    <label for="size" class="block text-sm font-medium mb-3 text-gray-300">Target Size</label>
                    <select id="size" class="w-full p-3 border border-gray-600 bg-gray-700 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition">
                        <option value="440x280">Small Promo (440×280) - Required</option>
                        <option value="1400x560">Marquee (1400×560)</option>
                        <option value="1280x800">Screenshot Large (1280×800)</option>
                        <option value="640x400">Screenshot Small (640×400)</option>
                        <option value="128x128">Icon (128×128)</option>
                    </select>
                </div>

                <button id="confirm" class="w-full py-4 bg-gradient-to-r from-blue-500 to-cyan-600 hover:from-blue-600 hover:to-cyan-700 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center gap-2 group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Generate Preview
                </button>

                <div id="preview-container" class="hidden">
                    <label class="block text-sm font-medium mb-3 text-gray-300">Final Preview</label>
                    <canvas id="preview" class="w-full border-2 border-blue-500 rounded-xl shadow-lg"></canvas>
                </div>

                <button id="download" class="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center gap-2 group hidden">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    Download PNG
                </button>
            </div>
        </div>

        <div class="flex-1 relative bg-gray-900 flex items-center justify-center overflow-hidden p-4 md:p-0">
            <div id="crop-container" class="relative" style="max-width: 100%; max-height: calc(100vh - 200px);">
                <img id="image" src="" class="absolute block" draggable="false">
                <div id="crop-overlay"></div>
            </div>
            <p id="placeholder" class="text-center text-gray-500 text-lg absolute pointer-events-none px-4">
                Upload an image to start cropping<br>
                <span class="text-sm">Blue frame = exact crop area • Scroll to zoom • Drag to move</span>
            </p>
            <div id="zoom-info" class="hidden">
                <button id="zoom-out">−</button>
                <span>Zoom: <span id="zoom-percent">100</span>%</span>
                <button id="zoom-in">+</button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const uploadInput = document.getElementById('upload');
        const img = document.getElementById('image');
        const container = document.getElementById('crop-container');
        const overlay = document.getElementById('crop-overlay');
        const sizeSelect = document.getElementById('size');
        const previewCanvas = document.getElementById('preview');
        const previewContainer = document.getElementById('preview-container');
        const downloadBtn = document.getElementById('download');
        const confirmBtn = document.getElementById('confirm');
        const placeholder = document.getElementById('placeholder');
        const zoomInfo = document.getElementById('zoom-info');
        const zoomPercent = document.getElementById('zoom-percent');
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomOutBtn = document.getElementById('zoom-out');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        let isDragging = false;
        let startX, startY;
        let imgLeft = 0, imgTop = 0;
        let scale = 1;
        let targetW = 440;
        let targetH = 280;

        ['dragenter', 'dragover'].forEach(e => {
            dropZone.addEventListener(e, ev => {
                ev.preventDefault();
                ev.stopPropagation();
                dropZone.classList.add('drag-over');
            });
        });

        ['dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, ev => {
                ev.preventDefault();
                ev.stopPropagation();
                dropZone.classList.remove('drag-over');
            });
        });

        dropZone.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) loadImage(file);
        });

        dropZone.addEventListener('click', () => uploadInput.click());
        uploadInput.addEventListener('change', e => {
            if (e.target.files[0]) loadImage(e.target.files[0]);
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = ev => {
                img.src = ev.target.result;
                img.onload = initializeCrop;
            };
            reader.readAsDataURL(file);
        }

        function initializeCrop() {
            [targetW, targetH] = sizeSelect.value.split('x').map(Number);

            overlay.style.width = `${targetW}px`;
            overlay.style.height = `${targetH}px`;
            container.style.width = `${targetW}px`;
            container.style.height = `${targetH}px`;

            const viewportW = window.innerWidth - 32;
            const viewportH = window.innerHeight - 200;
            const scaleFit = Math.min(
                Math.min(viewportW / targetW, 1),
                Math.min(viewportH / targetH, 1)
            );

            if (scaleFit < 1) {
                container.style.transform = `scale(${scaleFit})`;
            } else {
                container.style.transform = 'none';
            }

            const scaleX = targetW / img.naturalWidth;
            const scaleY = targetH / img.naturalHeight;
            scale = Math.max(scaleX, scaleY);

            const displayW = img.naturalWidth * scale;
            const displayH = img.naturalHeight * scale;
            img.style.width = `${displayW}px`;
            img.style.height = `${displayH}px`;

            imgLeft = (targetW - displayW) / 2;
            imgTop = (targetH - displayH) / 2;
            updateImagePosition();

            updateZoomDisplay();

            placeholder.style.display = 'none';
            zoomInfo.classList.remove('hidden');
            previewContainer.classList.add('hidden');
            downloadBtn.classList.add('hidden');
        }

        function updateImagePosition() {
            img.style.left = `${imgLeft}px`;
            img.style.top = `${imgTop}px`;
        }

        function updateZoomDisplay() {
            zoomPercent.textContent = Math.round(scale * 100);
        }

        function zoomBy(delta) {
            if (!img.src) return;
            const oldScale = scale;
            scale += delta;
            scale = Math.max(0.05, Math.min(scale, 50));

            if (Math.abs(scale - oldScale) > 0.001) {
                const rect = container.getBoundingClientRect();
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const displayW = img.naturalWidth * scale;
                const displayH = img.naturalHeight * scale;
                img.style.width = `${displayW}px`;
                img.style.height = `${displayH}px`;

                const ratio = scale / oldScale;
                imgLeft = centerX - (centerX - imgLeft) * ratio;
                imgTop = centerY - (centerY - imgTop) * ratio;

                updateImagePosition();
                updateZoomDisplay();
            }
        }

        zoomInBtn.addEventListener('click', () => zoomBy(0.01));
        zoomOutBtn.addEventListener('click', () => zoomBy(-0.01));

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });

        window.addEventListener('resize', () => {
            if (img.src) {
                const viewportW = window.innerWidth - 32;
                const viewportH = window.innerHeight - 200;
                const scaleFit = Math.min(
                    Math.min(viewportW / targetW, 1),
                    Math.min(viewportH / targetH, 1)
                );

                if (scaleFit < 1) {
                    container.style.transform = `scale(${scaleFit})`;
                } else {
                    container.style.transform = 'none';
                }
            }
        });

        confirmBtn.addEventListener('click', () => {
            previewCanvas.width = targetW;
            previewCanvas.height = targetH;

            const ctx = previewCanvas.getContext('2d');
            ctx.clearRect(0, 0, targetW, targetH);

            const sourceX = -imgLeft / scale;
            const sourceY = -imgTop / scale;
            const sourceW = targetW / scale;
            const sourceH = targetH / scale;

            ctx.drawImage(img, sourceX, sourceY, sourceW, sourceH, 0, 0, targetW, targetH);

            previewContainer.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `chrome-promo-${sizeSelect.value}.png`;
            link.href = previewCanvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
