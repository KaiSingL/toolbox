<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Promo Cropper - Web Tools Hub</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/icon.png">
    <link rel="stylesheet" href="../../assets/css/brutalist.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tool-page">
        <header class="tool-header">
            <button id="menu-toggle" class="mobile-menu-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <a href="../../index.html" class="tool-header-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>Back</span>
            </a>
            <h1 class="tool-header-title">Chrome Promo Cropper</h1>
        </header>

        <div class="tool-layout">
            <div id="sidebar-overlay"></div>
            <aside id="sidebar" class="tool-sidebar">
                <div class="tool-sidebar-content">
                    <div class="tool-section">
                        <label class="label-brutal">Image</label>
                        <button id="upload-btn" class="btn-primary w-full">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            Upload Image
                        </button>
                        <p class="upload-hint">Or drag & drop anywhere</p>
                        <input type="file" id="upload" accept="image/*" class="hidden">
                    </div>

                    <div class="tool-section">
                        <label for="size" class="label-brutal">Target Size</label>
                        <select id="size" class="select-brutal">
                            <option value="440x280">Small Promo (440×280)</option>
                            <option value="1400x560">Marquee (1400×560)</option>
                            <option value="1280x800">Screenshot Large (1280×800)</option>
                            <option value="640x400">Screenshot Small (640×400)</option>
                            <option value="128x128">Icon (128×128)</option>
                        </select>
                    </div>

                    <div class="tool-section">
                        <button id="confirm" class="btn-primary w-full">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                            </svg>
                            Generate Preview
                        </button>
                    </div>

                    <div id="preview-container" class="tool-section preview-container hidden">
                        <label class="label-brutal">Final Preview</label>
                        <canvas id="preview"></canvas>
                    </div>

                    <div class="tool-section">
                        <button id="download" class="btn-primary w-full hidden">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Download PNG
                        </button>
                    </div>
                </div>
            </aside>

              <main class="tool-canvas">
                  <div id="crop-container" class="tool-canvas-inner" style="max-width: 100%; max-height: calc(100vh - 200px); position: relative;">
                      <img id="image" src="" draggable="false">
                  </div>
                  <div id="crop-overlay"></div>
                <p id="placeholder" class="tool-placeholder">
                    <span class="tool-placeholder-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </span>
                    <span class="tool-placeholder-text">Upload an image to start cropping</span>
                </p>
                <div id="zoom-info" class="zoom-controls hidden">
                    <button id="zoom-out" class="zoom-btn">−</button>                    
                    <span>Zoom: <span id="zoom-percent">100</span>%</span>
                    <button id="zoom-in" class="zoom-btn">+</button>
                    <button id="center-overlay" class="zoom-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="6"/>
                            <line x1="22" x2="18" y1="12" y2="12"/>
                            <line x1="6" x2="2" y1="12" y2="12"/>
                            <line x1="12" x2="12" y1="6" y2="2"/>
                            <line x1="12" x2="12" y1="22" y2="18"/>
                        </svg>
                    </button>
                </div>
            </main>
        </div>

        <div id="drag-overlay">
            <div class="overlay-content">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p style="font-family: var(--font-display); font-size: 24px; margin-top: 24px;">Drop your image here</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });
    </script>
</body>
</html>
