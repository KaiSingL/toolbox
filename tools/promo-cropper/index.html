<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Promo Cropper - Web Tools Hub</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/icon.png">
    <link rel="stylesheet" href="../../assets/css/brutalist.css">
    <style>
        #crop-overlay {
            border: 2px solid var(--accent);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            position: absolute;
            box-sizing: border-box;
            z-index: 10;
            cursor: grab;
            touch-action: none;
        }

        #image {
            touch-action: none;
            user-select: none;
            cursor: default;
            image-rendering: -webkit-optimize-contrast;
            max-width: none;
            max-height: none;
            min-width: 0;
            min-height: 0;
        }

        #drag-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 5, 0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #drag-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        #drag-overlay .overlay-content {
            text-align: center;
            color: white;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .preview-container {
            padding-top: 24px;
            border-top: var(--border-thin);
        }

        #preview {
            width: 100%;
            border: 2px solid var(--accent);
            border-radius: 2px;
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-primary);
            color: white;
            padding: 8px 16px;
            border-radius: 2px;
            font-size: 14px;
            pointer-events: auto;
            z-index: 20;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-btn {
            background: var(--bg-surface);
            border: 1px solid var(--accent);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .zoom-btn:hover {
            background: var(--accent);
            color: var(--bg-primary);
        }
    </style>
</head>
<body>
    <div class="tool-page">
        <header class="tool-header">
            <button id="menu-toggle" class="mobile-menu-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <a href="../../index.html" class="tool-header-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>Back</span>
            </a>
            <h1 class="tool-header-title">Chrome Promo Cropper</h1>
        </header>

        <div class="tool-layout">
            <div id="sidebar-overlay"></div>
            <aside id="sidebar" class="tool-sidebar">
                <div class="tool-sidebar-content">
                    <div class="tool-section">
                        <label class="label-brutal">Image</label>
                        <button id="upload-btn" class="btn-primary w-full">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            Upload Image
                        </button>
                        <p class="upload-hint">Or drag & drop anywhere</p>
                        <input type="file" id="upload" accept="image/*" class="hidden">
                    </div>

                    <div class="tool-section">
                        <label for="size" class="label-brutal">Target Size</label>
                        <select id="size" class="select-brutal">
                            <option value="440x280">Small Promo (440×280)</option>
                            <option value="1400x560">Marquee (1400×560)</option>
                            <option value="1280x800">Screenshot Large (1280×800)</option>
                            <option value="640x400">Screenshot Small (640×400)</option>
                            <option value="128x128">Icon (128×128)</option>
                        </select>
                    </div>

                    <div class="tool-section">
                        <button id="confirm" class="btn-primary w-full">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                            </svg>
                            Generate Preview
                        </button>
                    </div>

                    <div id="preview-container" class="tool-section preview-container hidden">
                        <label class="label-brutal">Final Preview</label>
                        <canvas id="preview"></canvas>
                    </div>

                    <div class="tool-section">
                        <button id="download" class="btn-primary w-full hidden">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Download PNG
                        </button>
                    </div>
                </div>
            </aside>

              <main class="tool-canvas">
                  <div id="crop-container" class="tool-canvas-inner" style="max-width: 100%; max-height: calc(100vh - 200px);">
                     <img id="image" src="" draggable="false">
                     <div id="crop-overlay"></div>
                 </div>
                <p id="placeholder" class="tool-placeholder">
                    <span class="tool-placeholder-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </span>
                    <span class="tool-placeholder-text">Upload an image to start cropping</span>
                </p>
                <div id="zoom-info" class="zoom-controls hidden">
                    <button id="zoom-out" class="zoom-btn">−</button>
                    <span>Zoom: <span id="zoom-percent">100</span>%</span>
                    <button id="zoom-in" class="zoom-btn">+</button>
                </div>
            </main>
        </div>

        <div id="drag-overlay">
            <div class="overlay-content">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p style="font-family: var(--font-display); font-size: 24px; margin-top: 24px;">Drop your image here</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });
    </script>
</body>
</html>
