<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WiFi QR Code Generator - Web Tools Hub</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/icon.png">
  <link rel="stylesheet" href="../../assets/css/brutalist.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="../../index.html" class="logo">
        <div class="logo-icon">
          <img src="../../assets/icons/icon.png" alt="Icon" style="width: 30px; height: 30px;">
        </div>
        Web Tools Hub
      </a>
      <a href="https://github.com/KaiSingL/tool-box" target="_blank" class="github-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        <span>GitHub</span>
      </a>
    </div>
  </header>

  <main class="main">
    <div class="tool-container">
      <div class="tool-hero">
        <h1 class="section-title">WiFi QR Code Generator</h1>
        <p class="section-subtitle">Enter WiFi details to generate a scannable QR code. Uses WPA2 encryption by default.</p>
      </div>

      <div class="tool-form">
        <div class="form-group">
          <label for="ssid" class="label-brutal">Network Name (SSID)</label>
          <input
            type="text"
            id="ssid"
            class="input-brutal"
            placeholder="e.g., MyHomeWiFi"
            required
          />
        </div>

        <div class="form-group">
          <label for="pwd" class="label-brutal">Password</label>
          <input
            type="password"
            id="pwd"
            class="input-brutal"
            placeholder="Enter password"
          />
          <p class="helper-text">Leave blank for open networks</p>
        </div>

        <button id="generate-btn" class="btn-primary w-full">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <path d="M14 14m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/>
            <path d="M17 17m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/>
            <path d="M21 21l-6 0"/>
          </svg>
          Generate QR Code
        </button>

        <div id="error" class="error-message hidden"></div>

        <div id="qrcode" class="qr-result hidden"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer-text">&copy; 2025 Web Tools Hub. Open source under GNU Affero General Public License v3.0.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
