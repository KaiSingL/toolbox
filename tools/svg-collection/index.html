            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 border border-gray-200 dark:border-gray-700 text-center relative group hover:shadow-2xl transition-shadow">

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                </button>
                <svg id="svg-adjust-width" class="w-16 h-16 mx-auto mb-4 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12h6"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12H2"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v2"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v2"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14v2"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 20v2"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 15 3-3-3-3"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m5 9-3 3 3 3"></path>
                </svg>
                <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">Adjust Width</p>
            </div>

            <!-- Time Icon -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 border border-gray-200 dark:border-gray-700 text-center relative group hover:shadow-2xl transition-shadow">
                <button id="copy-time" class="absolute top-4 right-4 p-2 rounded-full bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-all opacity-0 group-hover:opacity-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                    </svg>
                </button>
                <svg id="svg-time" class="w-16 h-16 mx-auto mb-4 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6l4 2"></path><circle cx="12" cy="12" r="10" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></circle>
                </svg>
                <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">Time</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const copyButtons = document.querySelectorAll('[id^="copy-"]');
            copyButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const svgId = this.id.replace('copy-', 'svg-');
                    const svgElement = document.getElementById(svgId);
                    if (svgElement) {
                        const svgCode = svgElement.outerHTML;
                        navigator.clipboard.writeText(svgCode).then(() => {
                            const originalHTML = button.innerHTML;
                            button.classList.add('bg-green-500', 'text-white');
                            button.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
                            setTimeout(() => {
                                button.classList.remove('bg-green-500', 'text-white');
                                button.innerHTML = originalHTML;
                            }, 2000);
                        }).catch(err => {
                            console.error('Copy failed:', err);
                            alert('Copy failed – try again');
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
